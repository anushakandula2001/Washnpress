services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Host 3002 so local `npm run dev` always owns http://localhost:3000
    ports:
      - "3002:3000"
    profiles:
      - web
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: washnpress
      POSTGRES_USER: washnpress
      POSTGRES_PASSWORD: washnpress
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
